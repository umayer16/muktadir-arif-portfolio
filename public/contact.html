<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Muktadir Arif</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <section class="section">
    <div class="container">

      <div class="reveal contact-header">
        <div class="section-eyebrow contact-eyebrow">Get In Touch</div>
        <h1 class="section-title">Let's<br><em>Connect.</em></h1>
        <p class="contact-description">
          Open to research collaborations, remote programs, and conversations about CS, AI, or competitive programming. Inbox is always open.
        </p>
      </div>

      <div class="contact-wrap reveal">
        <form action="https://formspree.io/f/xrbnajdo" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" name="name" class="form-input" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-input" placeholder="Research collaboration, question...">
          </div>
          <div class="form-group">
            <label class="form-label">Message</label>
            <textarea name="message" class="form-textarea" placeholder="What's on your mind?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Send Message</button>
        </form>

        <hr class="divider" style="margin:3rem 0;">

        <div class="social-links">
          <a href="https://github.com/umayer16" target="_blank" rel="noopener noreferrer" class="social-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            GitHub
          </a>
          <a href="https://www.linkedin.com/in/muktadir-arif-25b645378/" target="_blank" rel="noopener noreferrer" class="social-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
            LinkedIn
          </a>
          <a href="https://codeforces.com/profile/umayer_16" target="_blank" rel="noopener noreferrer" class="social-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            Codeforces
          </a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-copy">© 2026 Muktadir Arif · Dhaka, Bangladesh</p>
      <div class="footer-links">
        <a href="https://github.com/umayer16" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/muktadir-arif-25b645378/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
